<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#05080c">
  <meta name="description" content="Registro de ventas e inventario offline">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ventas">
  <title>Ventas</title>
  <script>
    (function () {
      var theme = localStorage.getItem('ventas-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', theme === 'dark' ? '#05080c' : '#d4e0de');
    })();
  </script>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon.png" type="image/png">
  <link rel="icon" href="./icons/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>
  <div id="app-splash" class="app-splash" aria-hidden="false">
    <img src="./icons/icon.png" alt="Ventas" class="app-splash__logo" width="220" height="220">
  </div>
  <div id="app-shell">
    <header class="app-header">
      <div class="header-row">
        <div class="header-brand">
          <img src="./icons/icon.png" alt="" class="app-logo" width="40" height="40">
          <div class="header-titles">
            <h1 id="page-title">Inicio</h1>
            <p id="page-date" class="page-date"></p>
          </div>
        </div>
        <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema" data-icon="moon"></button>
      </div>
    </header>

    <main id="main-content" class="main-content"></main>

    <nav class="bottom-nav" aria-label="Navegación principal">
      <button type="button" class="nav-btn active" data-view="inicio" aria-label="Inicio">
        <span class="nav-icon" data-icon="home"></span>
        <span class="nav-label">Inicio</span>
      </button>
      <button type="button" class="nav-btn" data-view="venta" aria-label="Venta">
        <span class="nav-icon" data-icon="sale"></span>
        <span class="nav-label">Venta</span>
      </button>
      <button type="button" class="nav-btn" data-view="inventario" aria-label="Inventario">
        <span class="nav-icon" data-icon="box"></span>
        <span class="nav-label">Stock</span>
      </button>
      <button type="button" class="nav-btn" data-view="catalogo" aria-label="Catálogo">
        <span class="nav-icon" data-icon="catalog"></span>
        <span class="nav-label">Catálogo</span>
      </button>
      <button type="button" class="nav-btn" data-view="reportes" aria-label="Reportes">
        <span class="nav-icon" data-icon="chart"></span>
        <span class="nav-label">Reportes</span>
      </button>
    </nav>
  </div>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-overlay" data-modal-close></div>
    <div class="modal-panel">
      <h2 id="modal-title" class="modal-title"></h2>
      <p id="modal-message" class="modal-message hidden"></p>
      <form id="modal-form">
        <div id="modal-fields"></div>
        <div class="btn-group modal-actions">
          <button type="button" class="btn btn-secondary" id="modal-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="modal-submit">Guardar</button>
        </div>
      </form>
      <div id="modal-confirm-actions" class="btn-group modal-actions hidden">
        <button type="button" class="btn btn-secondary" data-modal-close>Cancelar</button>
        <button type="button" class="btn btn-danger" id="modal-confirm-ok">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="./js/icons.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/export.js"></script>
  <script src="./js/app.js"></script>
  <script>
    (function registerServiceWorker() {
      if (!('serviceWorker' in navigator) || location.protocol === 'file:') return;

      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./service-worker.js', { scope: './' })
          .then(function (registration) {
            registration.addEventListener('updatefound', function () {
              var installing = registration.installing;
              if (!installing) return;
              installing.addEventListener('statechange', function () {
                if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                  console.info('[PWA] Nueva versión disponible. Recarga la app para actualizar.');
                }
              });
            });
          })
          .catch(function (err) {
            console.warn('[PWA] No se pudo registrar el Service Worker:', err);
          });
      });
    })();
  </script>
</body>
</html>
